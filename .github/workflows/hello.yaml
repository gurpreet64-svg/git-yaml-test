# This is workflow name
 name: Hello 

# runs on a auotmatic trigger whenever change is pushed to branch (deployment)
 on:
    push:
      branches: [main]

# these are jobs inside the workflow
 jobs:
     greet:

   # this is gitbub runner
      runs-on: ubuntu-latest         
      steps:
        - name: say hello to users
          run: echo "Hello Dosto"
        - name: say hello to username
          run: echo "Hello $USER"

     details:
      # this is gitbub runner
       runs-on: ubuntu-latest
       steps:
        - name: show what is the version o Python, docker etc
          run: docker --version && python --version && java --version
       
